name: release

# Build the sdist + wheel on a version tag and attach them to a GitHub Release.
# Publishing to PyPI is opt-in: configure PyPI Trusted Publishing for this repo
# and uncomment the publish job below.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Attach artifacts to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

