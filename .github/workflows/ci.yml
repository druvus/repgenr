name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev tools
        run: |
          python -m pip install --upgrade pip
          # ete3 pulls heavy deps; keep CI to the importable pure-Python stack.
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src/ tests/

      - name: Mypy
        run: mypy src/repgenr

      - name: Pytest
        run: pytest -q --cov=repgenr --cov-report=term-missing --cov-fail-under=50
