name: repgenr
# Lower bounds match the min_version floors enforced at preflight (BinarySpec
# min_version). For a fully reproducible environment, generate a pinned lock from
# a solved env (e.g. `conda env export --no-builds > environment.lock.yml`, or
# conda-lock) per platform; these floors only guard against known-incompatible
# old tools, not exact reproducibility.
channels:
  - conda-forge
  - bioconda
dependencies:
  - python>=3.12
  - pip
  # Python libraries
  - matplotlib
  - requests
  - biopython
  - ete3
  - pyyaml
  - numpy>=1.26
  # Dereplication tools
  - drep
  - checkm-genome
  - skder>=1.0
  - skani>=0.2
  - galah
  - sourmash>=4.0
  # Optional: enables the sparse (edge-list) sourmash dereplication back-end at
  # scale. Absent, the dereplicator falls back to dense `sourmash compare`.
  - sourmash_plugin_branchwater>=0.9
  # Genome download
  - ncbi-datasets-cli
  # Aligners
  - progressivemauve
  - sibeliaz
  # cactus is distributed separately (containers/binaries); see docs
  # SNP typers (samtools/bcftools >= 1.10: an ancient 0.1.x breaks bcftools mpileup)
  - minimap2>=2.17
  - samtools>=1.10
  - bcftools>=1.10
  - snippy
  - parsnp
  - harvesttools
  - gubbins
  # Tree builders
  - iqtree
  - fasttree
  - mashtree>=1.2
  - raxml-ng>=1.0
  - pip:
      - -e .
